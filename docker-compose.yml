services:
  automations:
    build: .
    volumes:
      - ap-data:/app/data
      - ap-logs:/var/log
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GHL_API_KEY=${GHL_API_KEY}
      - GHL_LOCATION_ID=${GHL_LOCATION_ID}
      - GHL_INQUIRIES_PIPELINE_ID=${GHL_INQUIRIES_PIPELINE_ID}
      - GHL_INQUIRIES_STAGE_ID=${GHL_INQUIRIES_STAGE_ID}
      - GHL_CALENDAR_LINK=${GHL_CALENDAR_LINK}
      - GHL_USER_ID=${GHL_USER_ID}
      - GHL_PROPOSAL_SENT_STAGE_ID=${GHL_PROPOSAL_SENT_STAGE_ID}
      - GHL_NEGOTIATING_STAGE_ID=${GHL_NEGOTIATING_STAGE_ID}
      - GHL_UNSUBSCRIBE_TRIGGER_URL=${GHL_UNSUBSCRIBE_TRIGGER_URL}
      - SALES_DIGEST_TO_EMAIL=${SALES_DIGEST_TO_EMAIL}
      - COLD_OUTREACH_REVIEW_EMAIL=${COLD_OUTREACH_REVIEW_EMAIL}
      - COLD_OUTREACH_FROM_EMAIL=${COLD_OUTREACH_FROM_EMAIL}
      - WATCHDOG_EMAIL_FROM=${WATCHDOG_EMAIL_FROM}
      - WATCHDOG_EMAIL_TO=${WATCHDOG_EMAIL_TO}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - SAM_EMAIL=${SAM_EMAIL}
      - SAM_CELL=${SAM_CELL}
      - SAM_CARRIER_GATEWAY=${SAM_CARRIER_GATEWAY}
      - GOOGLE_TOKEN_B64=${GOOGLE_TOKEN_B64}
      - GOOGLE_CREDS_B64=${GOOGLE_CREDS_B64}
      - AIRTABLE_PAT=${AIRTABLE_PAT}
      - AIRTABLE_BASE_ID=${AIRTABLE_BASE_ID}
      - AIRTABLE_CLIENTS_TABLE_ID=${AIRTABLE_CLIENTS_TABLE_ID}
      - AIRTABLE_ACTIVITIES_TABLE_ID=${AIRTABLE_ACTIVITIES_TABLE_ID}
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - GBP_ACCOUNT_ID=${GBP_ACCOUNT_ID}
      - GBP_LOCATION_ID=${GBP_LOCATION_ID}
      - GBP_TOKEN_B64=${GBP_TOKEN_B64}
      # WCAS dashboard heartbeat — see shared_utils/push_heartbeat.py
      - DASHBOARD_URL=${DASHBOARD_URL}
      - HEARTBEAT_SHARED_SECRET=${HEARTBEAT_SHARED_SECRET}
      # Social Media (Gemini for image generation, Google Drive for hosting public URLs)
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SOCIAL_DRIVE_FOLDER_ID=${SOCIAL_DRIVE_FOLDER_ID}
      - SOCIAL_DRIVE_TOKEN_B64=${SOCIAL_DRIVE_TOKEN_B64}
      # SEO (DataForSEO + CrUX for keyword/competitor data, Google service account for indexing)
      - DATAFORSEO_LOGIN=${DATAFORSEO_LOGIN}
      - DATAFORSEO_PASSWORD=${DATAFORSEO_PASSWORD}
      - CRUX_API_KEY=${CRUX_API_KEY}
      - SEO_TOKEN_B64=${SEO_TOKEN_B64}
      - SEO_INDEXING_SA_B64=${SEO_INDEXING_SA_B64}
      # Blog Post (GHL publishing fields)
      - GHL_AUTHOR_ID=${GHL_AUTHOR_ID}
      - GHL_BLOG_CHANNEL_ID=${GHL_BLOG_CHANNEL_ID}
      - GHL_CATEGORY_ID=${GHL_CATEGORY_ID}
      # Guard Compliance (Connecteam custom fields = officer cert data)
      - CONNECTEAM_API_KEY=${CONNECTEAM_API_KEY}
      # Patrol Automation (Morning Reports) — Connecteam API client credentials
      # for DAR / vehicle / incident pulls (different keys from guard compliance).
      - CONNECTEAM_CLIENT_ID=${CONNECTEAM_CLIENT_ID}
      - CONNECTEAM_CLIENT_SECRET=${CONNECTEAM_CLIENT_SECRET}
      # Harbor Lights — Google Sheet ID + OAuth token (cut over from Excel 2026-04).
      - HL_SHEET_ID=${HL_SHEET_ID}
      - SHEETS_TOKEN_B64=${SHEETS_TOKEN_B64}
    restart: unless-stopped

volumes:
  ap-data:
  ap-logs:
